---
layout: default
---

<section class="bg-dark text-white heroBanner">
    <div class="container">
        <div class="row align-items-center py-5">
            <div class="col-12">
                <h1 class="display-4 fw-bold gap-4">{{ page.title }}</h1>
                <p class="text-light gap-4">{{ page.description }}</p>
                <div class="d-flex gap-3 flex-wrap">
                    <a href="https://github.com/GeekInTheNorth/" class="btn btn-outline-light btn-lg" target="_blank"><i class="fab fa-github me-2"></i>GitHub</a>
                    <a href="https://www.linkedin.com/in/mark-antony-stott/" class="btn btn-outline-light btn-lg" target="_blank"><i class="fab fa-linkedin me-2"></i>LinkedIn</a>
                    <a href="https://www.buymeacoffee.com/markstott" class="btn btn-outline-light btn-lg" target="_blank"><i class="fa fa-coffee me-2"></i>Buy me a coffee</a>
                </div>
            </div>
        </div>
    </div>
</section>
<div class="container main-content">
  <section>
    <h2 class="h3 fw-semibold text-dark mb-4">Articles</h2>
    <div class="row g-4">
    {% for post in site.posts %}
      {% if post.categories contains page.title %}
        {% include promo.html article = post %}
      {% endif %}
    {% endfor %}
    </div>
  </section>

</div>
